<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>IDIOT QC</title>
<link rel="stylesheet" href="/css/app.css">
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="logo-mark">IDIOT</div>
    <div class="logo-sub">QUALITY CONTROL — acceso</div>
    <div id="login-error"></div>
    <div class="field-label">Usuario</div>
    <input class="field-input" id="login-user" autocomplete="username" style="margin-bottom:12px">
    <div class="field-label">Contraseña</div>
    <input class="field-input" id="login-pass" type="password" autocomplete="current-password" style="margin-bottom:16px" onkeydown="if(event.key==='Enter')submitLogin()">
    <button type="button" class="btn btn-accent" style="width:100%" onclick="submitLogin()">Entrar</button>
  </div>
</div>

<div id="app" class="hidden">
  <nav id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">IDIOT</div>
      <div class="logo-sub">QUALITY CONTROL</div>
    </div>
    <div class="sidebar-nav">
      <div class="nav-section">Menú</div>
      <div class="nav-item active" data-view="home" onclick="navigate('home')">
        <span class="icon">⊞</span> Productos
      </div>
      <div class="nav-item" data-view="dashboard" onclick="navigate('dashboard')">
        <span class="icon">◈</span> Dashboard
      </div>
      <div class="nav-item" data-view="history" onclick="navigate('history')">
        <span class="icon">≡</span> Historial
      </div>
      <div class="nav-item" data-view="config" onclick="navigate('config')">
        <span class="icon">⚙</span> Configuración
      </div>
      <div class="nav-section">QC en curso</div>
      <div id="active-session-nav" style="padding:8px;color:var(--text3);font-size:12px">Ninguno</div>
    </div>
  </nav>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

  <div id="main">
    <div id="topbar">
      <button id="hamburger" onclick="toggleSidebar()">☰</button>
      <div class="topbar-title" id="topbar-title">Seleccioná un producto</div>
      <div class="topbar-meta" id="topbar-meta"></div>
      <div id="topbar-actions"></div>
    </div>
    <div id="content"></div>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal" id="modal-body"></div>
</div>

<div class="toast" id="toast"></div>

<script src="/js/app.js"></script>
</body>
</html>
